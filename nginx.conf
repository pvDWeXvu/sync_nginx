# 1. 必须首先加载动态模块 (针对 Ubuntu/Debian 等系统)
load_module /usr/lib/nginx/modules/ngx_stream_module.so;

# user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

# --- Stream 模块配置区 (处理 VLESS TCP 转发) ---
stream {
    # 定义后端 Reality 服务
    upstream vless_reality {
        server 127.0.0.1:2083;
    }

    server {
        # Nginx 对外监听的端口
        listen 11501;
        # 如果需要监听 IPv6，取消下行注释
        # listen [::]:11501;

        # 核心转发指令
        proxy_pass vless_reality;

        # 调优参数
        proxy_connect_timeout 5s;
        proxy_timeout 1h;           # 长连接保持时间
        proxy_buffer_size 16k;      # 缓冲区大小
    }
}

# --- HTTP 模块配置区 (必须保留，否则 Nginx 可能无法启动) ---
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # 如果你有其他网站配置，可以包含在这里
    # include /etc/nginx/conf.d/*.conf;

    # 默认的空 server 块，防止直接通过 IP 访问
    server {
        listen       80;
        server_name  localhost;

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
        }
    }
}
